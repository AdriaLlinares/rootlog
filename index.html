<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rootlog — writeups</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230A0C10'/%3E%3Cpath d='M8 10h4l3 3-3 3H8z' fill='%234CC9F0'/%3E%3Crect x='16' y='20' width='9' height='2.4' rx='1' fill='%23E9B44C'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
/* ===== tema de resaltado (highlight.js) ===== */
pre code.hljs{display:block;overflow-x:auto;padding:1em}code.hljs{padding:3px 5px}.hljs{color:#abb2bf;background:#282c34}.hljs-comment,.hljs-quote{color:#5c6370;font-style:italic}.hljs-doctag,.hljs-formula,.hljs-keyword{color:#c678dd}.hljs-deletion,.hljs-name,.hljs-section,.hljs-selector-tag,.hljs-subst{color:#e06c75}.hljs-literal{color:#56b6c2}.hljs-addition,.hljs-attribute,.hljs-meta .hljs-string,.hljs-regexp,.hljs-string{color:#98c379}.hljs-attr,.hljs-number,.hljs-selector-attr,.hljs-selector-class,.hljs-selector-pseudo,.hljs-template-variable,.hljs-type,.hljs-variable{color:#d19a66}.hljs-bullet,.hljs-link,.hljs-meta,.hljs-selector-id,.hljs-symbol,.hljs-title{color:#61aeee}.hljs-built_in,.hljs-class .hljs-title,.hljs-title.class_{color:#e6c07b}.hljs-emphasis{font-style:italic}.hljs-strong{font-weight:700}.hljs-link{text-decoration:underline}

/* ===== estilos del sitio ===== */
:root{
  --bg:#0A0C10; --surface:#10141C; --surface-2:#161B26; --border:#232A38; --border-lit:#324056;
  --text:#E6E9EF; --dim:#8A93A3; --faint-c:#586273;
  --cyan:#4CC9F0; --gold:#E9B44C;
  --easy:#5BC97F; --medium:#E9B44C; --hard:#F0564A; --insane:#B37FEB;
  --htb:#9FEF00; --thm:#F26B6B; --vh:#7C8CF0;
  --sans:'Inter',system-ui,sans-serif; --disp:'Space Grotesk',var(--sans); --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg); color:var(--text); font-family:var(--sans); line-height:1.55; -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(650px circle at 12% -5%, rgba(76,201,240,.06), transparent 60%),radial-gradient(600px circle at 100% 0%, rgba(233,180,76,.05), transparent 55%);
  min-height:100vh;}
.wrap{max-width:1080px; margin:0 auto; padding:0 22px}
[hidden]{display:none !important}

/* ---- índice ---- */
header.site{padding:52px 0 30px; border-bottom:1px solid var(--border)}
.brand{display:flex; align-items:center; gap:12px; font-family:var(--mono); font-size:13px; color:var(--dim); letter-spacing:.02em}
.brand .dot{width:9px; height:9px; border-radius:50%; background:var(--gold); box-shadow:0 0 12px var(--gold)}
h1.site-title{font-family:var(--disp); font-weight:700; font-size:clamp(2rem,5vw,3.1rem); letter-spacing:-.02em; margin:16px 0 6px; line-height:1.05}
h1.site-title .cur{color:var(--cyan); font-weight:400; animation:blink 1.2s steps(2) infinite}
@keyframes blink{50%{opacity:0}}
.tagline{color:var(--dim); font-size:1.02rem; max-width:52ch}
.stats{display:flex; flex-wrap:wrap; gap:26px; margin-top:26px; font-family:var(--mono)}
.stat .n{font-size:1.7rem; font-weight:700; color:var(--text); font-family:var(--disp)}
.stat .n.gold{color:var(--gold)}
.stat .l{font-size:.68rem; letter-spacing:.14em; text-transform:uppercase; color:var(--faint-c)}
.controls{position:sticky; top:0; z-index:20; padding:18px 0 14px; margin-bottom:4px; background:linear-gradient(var(--bg) 78%, transparent); -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px)}
.search{display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:11px 15px; transition:border-color .18s}
.search:focus-within{border-color:var(--cyan)}
.search svg{flex:none; color:var(--faint-c)}
.search input{flex:1; background:none; border:none; outline:none; color:var(--text); font-family:var(--mono); font-size:.9rem}
.search input::placeholder{color:var(--faint-c)}
.search kbd{font-family:var(--mono); font-size:.7rem; color:var(--faint-c); border:1px solid var(--border); border-radius:5px; padding:2px 6px}
.filters{display:flex; flex-wrap:wrap; gap:8px 18px; margin-top:14px; align-items:center}
.fgroup{display:flex; flex-wrap:wrap; gap:7px; align-items:center}
.fgroup .glabel{font-family:var(--mono); font-size:.64rem; letter-spacing:.13em; text-transform:uppercase; color:var(--faint-c); margin-right:2px}
.chip{font-family:var(--mono); font-size:.76rem; color:var(--dim); background:var(--surface); border:1px solid var(--border); padding:5px 11px; border-radius:99px; cursor:pointer; transition:.15s; user-select:none}
.chip:hover{border-color:var(--border-lit); color:var(--text)}
.chip.on{color:var(--bg); background:var(--cyan); border-color:var(--cyan); font-weight:500}
.chip.on[data-plat="HTB"]{background:var(--htb); border-color:var(--htb)}
.chip.on[data-plat="THM"]{background:var(--thm); border-color:var(--thm)}
.chip.on[data-plat="VulnHub"]{background:var(--vh); border-color:var(--vh)}
.count{font-family:var(--mono); font-size:.74rem; color:var(--faint-c); margin:20px 0 14px}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; padding-bottom:70px}
.card{position:relative; display:flex; flex-direction:column; text-decoration:none; color:inherit; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px 18px 16px; overflow:hidden; transition:transform .18s ease, border-color .18s, box-shadow .18s; animation:rise .45s both}
@keyframes rise{from{opacity:0; transform:translateY(12px)}}
.card:hover{transform:translateY(-3px); border-color:var(--border-lit); box-shadow:0 14px 34px -18px rgba(0,0,0,.9)}
.card:focus-visible{outline:2px solid var(--cyan); outline-offset:2px}
.card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--edge,var(--cyan)); opacity:.85}
.c-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:12px}
.plat{font-family:var(--mono); font-size:.64rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:3px 8px; border-radius:5px; border:1px solid}
.plat.HTB{color:var(--htb); border-color:color-mix(in srgb,var(--htb) 40%,transparent)}
.plat.THM{color:var(--thm); border-color:color-mix(in srgb,var(--thm) 45%,transparent)}
.plat.VulnHub{color:var(--vh); border-color:color-mix(in srgb,var(--vh) 45%,transparent)}
.status{font-family:var(--mono); font-size:.62rem; font-weight:700; letter-spacing:.12em; display:flex; align-items:center; gap:6px}
.status::before{content:""; width:7px; height:7px; border-radius:50%}
.status.rooted{color:var(--gold)} .status.rooted::before{background:var(--gold); box-shadow:0 0 8px var(--gold)}
.status.user{color:var(--cyan)} .status.user::before{background:var(--cyan)}
.status.wip{color:var(--faint-c)} .status.wip::before{background:var(--faint-c)}
.c-name{font-family:var(--disp); font-size:1.34rem; font-weight:600; letter-spacing:-.01em; line-height:1.1}
.c-meta{font-family:var(--mono); font-size:.72rem; color:var(--dim); margin-top:5px; display:flex; gap:8px; flex-wrap:wrap; align-items:center}
.c-meta .diff{font-weight:700}
.c-meta .sep{color:var(--border-lit)}
.c-sum{font-size:.86rem; color:var(--dim); margin:12px 0 14px; flex:1}
.chain{display:flex; align-items:center; gap:0; margin-bottom:12px}
.step{flex:1; height:3px; border-radius:2px; background:var(--border)}
.step.done{background:var(--cyan)}
.step.done:last-child{background:var(--gold)}
.chain-lbl{display:flex; justify-content:space-between; font-family:var(--mono); font-size:.56rem; letter-spacing:.06em; text-transform:uppercase; color:var(--faint-c); margin-top:6px}
.chain-lbl span.act{color:var(--text)}
.tags{display:flex; flex-wrap:wrap; gap:5px; margin-top:auto}
.tag{font-family:var(--mono); font-size:.66rem; color:var(--dim); background:var(--surface-2); border:1px solid var(--border); padding:2px 7px; border-radius:4px}
.empty{grid-column:1/-1; text-align:center; padding:60px 20px; border:1px dashed var(--border); border-radius:12px; color:var(--dim)}
.empty h3{font-family:var(--disp); color:var(--text); margin-bottom:8px; font-weight:600}
footer.site{border-top:1px solid var(--border); padding:26px 0 40px; font-family:var(--mono); font-size:.74rem; color:var(--faint-c); display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px}
footer.site code{color:var(--cyan)}

/* ---- vista writeup ---- */
.topbar{border-bottom:1px solid var(--border); padding:18px 0}
.back{font-family:var(--mono); font-size:.8rem; color:var(--dim); text-decoration:none; display:inline-flex; align-items:center; gap:8px; transition:.15s; cursor:pointer; background:none; border:none}
.back:hover{color:var(--cyan)}
.doc-wrap{max-width:820px; margin:0 auto; padding:0 22px}
header.doc{padding:40px 0 26px; border-bottom:1px solid var(--border)}
.eyebrow{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:16px}
.wu-plat{font-family:var(--mono); font-size:.66rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:4px 9px; border-radius:5px; border:1px solid}
.wu-plat.HTB{color:var(--htb); border-color:color-mix(in srgb,var(--htb) 40%,transparent)}
.wu-plat.THM{color:var(--thm); border-color:color-mix(in srgb,var(--thm) 45%,transparent)}
.wu-plat.VulnHub{color:var(--vh); border-color:color-mix(in srgb,var(--vh) 45%,transparent)}
.wu-status{font-family:var(--mono); font-size:.66rem; font-weight:700; letter-spacing:.12em; display:flex; align-items:center; gap:7px}
.wu-status::before{content:""; width:8px; height:8px; border-radius:50%}
.wu-status.rooted{color:var(--gold)} .wu-status.rooted::before{background:var(--gold); box-shadow:0 0 8px var(--gold)}
.wu-status.user{color:var(--cyan)} .wu-status.user::before{background:var(--cyan)}
.wu-status.wip{color:var(--faint-c)} .wu-status.wip::before{background:var(--faint-c)}
h1.title{font-family:var(--disp); font-weight:700; font-size:clamp(2rem,6vw,3rem); letter-spacing:-.02em; line-height:1.02}
.metabar{display:flex; flex-wrap:wrap; gap:0; margin-top:22px; border:1px solid var(--border); border-radius:10px; overflow:hidden; background:var(--surface)}
.mcell{flex:1; min-width:120px; padding:12px 16px; border-right:1px solid var(--border)}
.mcell:last-child{border-right:none}
.mcell .k{font-family:var(--mono); font-size:.58rem; letter-spacing:.14em; text-transform:uppercase; color:var(--faint-c)}
.mcell .v{font-family:var(--mono); font-size:.92rem; margin-top:3px; font-weight:500}
.wu-chain{display:flex; gap:8px; margin-top:20px}
.cstep{flex:1; text-align:center; padding:9px 6px; border:1px solid var(--border); border-radius:8px; background:var(--surface)}
.cstep .cs-n{font-family:var(--mono); font-size:.6rem; color:var(--faint-c)}
.cstep .cs-l{font-family:var(--disp); font-size:.82rem; font-weight:600; margin-top:2px; color:var(--dim)}
.cstep.done{border-color:color-mix(in srgb,var(--cyan) 45%,transparent)}
.cstep.done .cs-l{color:var(--text)}
.cstep.done:last-child{border-color:color-mix(in srgb,var(--gold) 50%,transparent)}
.cstep.done:last-child .cs-l{color:var(--gold)}
article{padding:36px 0 20px; font-size:1.02rem}
article h1{display:none}
article h2{font-family:var(--disp); font-size:1.5rem; font-weight:600; letter-spacing:-.01em; margin:38px 0 14px; padding-top:10px; border-top:1px solid var(--border)}
article h2:first-of-type{border-top:none; padding-top:0}
article h3{font-family:var(--disp); font-size:1.15rem; font-weight:600; margin:26px 0 10px}
article p{margin:14px 0; color:#D3D8E0}
article a{color:var(--cyan); text-decoration:none; border-bottom:1px solid color-mix(in srgb,var(--cyan) 35%,transparent)}
article a:hover{border-bottom-color:var(--cyan)}
article strong{color:var(--text); font-weight:700}
article ul,article ol{margin:14px 0 14px 22px; color:#D3D8E0}
article li{margin:6px 0}
article blockquote{border-left:3px solid var(--gold); background:var(--surface); margin:18px 0; padding:12px 18px; border-radius:0 8px 8px 0; font-family:var(--mono); font-size:.85rem; color:var(--dim)}
article blockquote p{margin:0; color:var(--dim)}
article code{font-family:var(--mono); font-size:.86em; background:var(--surface-2); border:1px solid var(--border); padding:1px 6px; border-radius:5px; color:var(--gold)}
article pre{background:#0d1017; border:1px solid var(--border); border-radius:10px; padding:16px 18px; overflow-x:auto; margin:18px 0; position:relative}
article pre code{background:none; border:none; padding:0; color:#c5cbd6; font-size:.84rem; line-height:1.6}
article pre::before{content:attr(data-lang); position:absolute; top:0; right:0; font-family:var(--mono); font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; color:var(--faint-c); background:var(--surface); padding:3px 9px; border-radius:0 9px 0 8px; border-left:1px solid var(--border); border-bottom:1px solid var(--border)}
article table{width:100%; border-collapse:collapse; margin:18px 0; font-size:.9rem; overflow:hidden; border-radius:8px; border:1px solid var(--border)}
article th,article td{padding:9px 14px; text-align:left; border-bottom:1px solid var(--border)}
article th{font-family:var(--mono); font-size:.7rem; letter-spacing:.06em; text-transform:uppercase; color:var(--dim); background:var(--surface); font-weight:600}
article td{font-family:var(--mono); font-size:.82rem; color:#D3D8E0}
article tr:last-child td{border-bottom:none}
article hr{border:none; border-top:1px solid var(--border); margin:30px 0}
article img{max-width:100%; height:auto; display:block; border-radius:10px; border:1px solid var(--border); margin:20px 0; box-shadow:0 10px 30px -18px rgba(0,0,0,.8)}
.img-missing{display:flex; align-items:center; gap:12px; margin:20px 0; padding:16px 18px; border:1px dashed var(--border-lit); border-radius:10px; background:var(--surface); color:var(--faint-c)}
.img-missing svg{flex:none; color:var(--faint-c)}
.img-missing strong{display:block; font-family:var(--disp); font-size:.9rem; color:var(--dim); font-weight:600}
.img-missing code{font-family:var(--mono); font-size:.76rem; color:var(--gold); background:none; border:none; padding:0}
.wu-tags{display:flex; flex-wrap:wrap; gap:6px; padding:24px 0 0; border-top:1px solid var(--border); margin-top:20px}
.wu-tag{font-family:var(--mono); font-size:.7rem; color:var(--dim); background:var(--surface-2); border:1px solid var(--border); padding:3px 9px; border-radius:5px}
footer.doc{padding:34px 0 60px; text-align:center}
footer.doc a{font-family:var(--mono); font-size:.82rem; color:var(--dim); text-decoration:none; cursor:pointer}
footer.doc a:hover{color:var(--cyan)}

@media (max-width:560px){
  header.site{padding:40px 0 24px}
  .stats{gap:20px}
  .controls{position:static}
  .wu-chain{flex-wrap:wrap}.cstep{min-width:calc(50% - 4px)}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important; scroll-behavior:auto}}

/* ---- botón + y modal de subida ---- */
#add-btn{position:fixed; right:26px; bottom:26px; z-index:60; width:56px; height:56px; border-radius:50%; border:1px solid color-mix(in srgb,var(--cyan) 55%,transparent); background:var(--surface-2); color:var(--cyan); font-size:30px; line-height:1; font-weight:400; cursor:pointer; box-shadow:0 12px 30px -10px rgba(0,0,0,.9); transition:transform .16s, background .16s, color .16s}
#add-btn:hover{transform:translateY(-2px) rotate(90deg); background:var(--cyan); color:var(--bg)}
.modal{position:fixed; inset:0; z-index:70; display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto; background:rgba(5,7,10,.72); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px)}
.modal-box{width:100%; max-width:560px; background:var(--surface); border:1px solid var(--border-lit); border-radius:14px; padding:26px; box-shadow:0 30px 80px -20px #000}
.modal-box h2{font-family:var(--disp); font-size:1.4rem; font-weight:600; margin-bottom:4px}
.modal-box .sub{color:var(--dim); font-size:.86rem; margin-bottom:20px}
.modal-box .sub code{font-family:var(--mono); font-size:.85em; color:var(--cyan)}
.dropzone{border:1.5px dashed var(--border-lit); border-radius:12px; padding:26px; text-align:center; cursor:pointer; transition:.16s; color:var(--dim); font-family:var(--mono); font-size:.85rem}
.dropzone:hover,.dropzone.drag{border-color:var(--cyan); color:var(--text); background:color-mix(in srgb,var(--cyan) 6%,transparent)}
.dropzone strong{color:var(--cyan)}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px 14px; margin-top:20px}
.field{display:flex; flex-direction:column; gap:5px}
.field.full{grid-column:1/-1}
.field label{font-family:var(--mono); font-size:.62rem; letter-spacing:.12em; text-transform:uppercase; color:var(--faint-c)}
.field input,.field select{background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:9px 11px; color:var(--text); font-family:var(--mono); font-size:.84rem; outline:none}
.field input:focus,.field select:focus{border-color:var(--cyan)}
.filehint{margin-top:14px; font-family:var(--mono); font-size:.74rem; color:var(--dim)}
.filehint b{color:var(--easy)}
.modal-actions{display:flex; gap:10px; justify-content:flex-end; margin-top:22px}
.btn{font-family:var(--mono); font-size:.82rem; padding:10px 16px; border-radius:9px; cursor:pointer; border:1px solid var(--border-lit); background:var(--surface-2); color:var(--text); transition:.15s}
.btn:hover{border-color:var(--dim)}
.btn.primary{background:var(--cyan); border-color:var(--cyan); color:var(--bg); font-weight:600}
.btn.primary:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.4; cursor:not-allowed}
.local-bar{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; background:color-mix(in srgb,var(--gold) 8%,var(--surface)); border:1px solid color-mix(in srgb,var(--gold) 30%,transparent); border-radius:10px; padding:12px 16px; margin-top:22px; font-family:var(--mono); font-size:.78rem; color:var(--dim)}
.local-bar b{color:var(--gold)}
.topbar-inner{display:flex; justify-content:space-between; align-items:center; gap:12px}
.wu-actions{display:flex; gap:8px}
.btn.tool{padding:7px 12px; font-size:.74rem}
.btn.tool.danger{color:var(--hard); border-color:color-mix(in srgb,var(--hard) 40%,transparent); background:var(--surface)}
.btn.tool.danger:hover{background:var(--hard); color:#fff; border-color:var(--hard)}
.field textarea{background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--text); font-family:var(--mono); font-size:.8rem; line-height:1.5; outline:none; resize:vertical; min-height:140px}
.field textarea:focus{border-color:var(--cyan)}
article img{cursor:zoom-in}
.lightbox{position:fixed; inset:0; z-index:90; display:flex; align-items:center; justify-content:center; padding:32px; background:rgba(3,5,8,.92); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); animation:lbfade .18s ease}
@keyframes lbfade{from{opacity:0}}
.lightbox img{max-width:96vw; max-height:92vh; border-radius:10px; border:1px solid var(--border-lit); box-shadow:0 30px 90px -20px #000; cursor:zoom-out}
#lightbox-close{position:fixed; top:20px; right:24px; width:42px; height:42px; border-radius:50%; border:1px solid var(--border-lit); background:var(--surface); color:var(--text); font-size:18px; cursor:pointer; transition:.15s}
#lightbox-close:hover{background:var(--hard); border-color:var(--hard); color:#fff}
</style>
</head>
<body>
<div id="view-list">
  <header class="site"><div class="wrap">
    <div class="brand"><span class="dot"></span> root@lab:~/rootlog</div>
    <h1 class="site-title">rootlog<span class="cur">_</span></h1>
    <p class="tagline">Registro de máquinas comprometidas en HTB, TryHackMe y VulnHub. Metodología, notas y lecciones de cada objetivo.</p>
    <div class="stats" id="stats"></div>
  </div></header>
  <main class="wrap">
    <div class="controls">
      <label class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="q" type="search" placeholder="buscar máquina, tag, técnica…" autocomplete="off" aria-label="Buscar writeups">
        <kbd>/</kbd>
      </label>
      <div class="filters" id="filters"></div>
    </div>
    <div class="count" id="count"></div>
    <div class="grid" id="grid"></div>
  </main>
  <footer class="site wrap"><span>// rootlog</span><span id="fyear"></span></footer>
</div>

<script>
"use strict";
console.log("%c[rootlog] index (solo lectura)", "color:#4CC9F0;font-weight:bold");
const WRITEUPS = (window.WRITEUPS_DATA || []).slice();
WRITEUPS.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
const norm = s => (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
const esc  = s => (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const EDGE = { HTB:"var(--htb)", THM:"var(--thm)", VulnHub:"var(--vh)" };
const DIFFCOLOR = { facil:"var(--easy)", media:"var(--medium)", dificil:"var(--hard)", insane:"var(--insane)" };
const CHAIN = ["Recon","Foothold","Priv-Esc","Root"];
const CHAIN_DONE = { rooted:4, user:2, wip:1 };
const STATUS_LABEL = { rooted:"ROOTED", user:"USER", wip:"EN CURSO" };
const listView = document.getElementById("view-list");
const wuView   = document.getElementById("view-writeup");
function getMarkdown(slug){ const w=WRITEUPS.find(x=>x.slug===slug); return w ? (w.md||"") : null; }
const STATE = { q:"", plat:"", diff:"", os:"", status:"" };
function buildStats(){
  const d=WRITEUPS, rooted=d.filter(x=>x.status==="rooted").length, by=p=>d.filter(x=>x.platform===p).length;
  const s=[["total",d.length,false],["rooteadas",rooted,true],["HTB",by("HTB"),false],["THM",by("THM"),false],["VulnHub",by("VulnHub"),false]];
  document.getElementById("stats").innerHTML=s.map(r=>'<div class="stat"><div class="n '+(r[2]?"gold":"")+'">'+String(r[1]).padStart(2,"0")+'</div><div class="l">'+r[0]+'</div></div>').join("");
}
function uniq(k){ return [...new Set(WRITEUPS.map(x=>x[k]).filter(Boolean))]; }
function buildFilters(){
  const groups=[["plat","Plataforma",["HTB","THM","VulnHub"]],["diff","Dificultad",["Fácil","Media","Difícil","Insane"]],["os","SO",uniq("os")],["status","Estado",[["rooted","Rooted"],["user","User"],["wip","En curso"]]]];
  document.getElementById("filters").innerHTML=groups.map(g=>{const key=g[0],label=g[1],vals=g[2];
    const chips=vals.map(v=>{const val=Array.isArray(v)?v[0]:v,txt=Array.isArray(v)?v[1]:v,pa=key==="plat"?'data-plat="'+val+'"':"";return '<span class="chip" '+pa+' data-key="'+key+'" data-val="'+val+'">'+txt+'</span>';}).join("");
    return '<div class="fgroup"><span class="glabel">'+label+'</span>'+chips+'</div>';}).join("");
  document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{const key=c.dataset.key,val=c.dataset.val;STATE[key]=STATE[key]===val?"":val;document.querySelectorAll('.chip[data-key="'+key+'"]').forEach(x=>x.classList.toggle("on",x.dataset.val===STATE[key]));renderGrid();}));
}
function matches(w){
  if(STATE.plat&&w.platform!==STATE.plat)return false;
  if(STATE.diff&&w.difficulty!==STATE.diff)return false;
  if(STATE.os&&w.os!==STATE.os)return false;
  if(STATE.status&&w.status!==STATE.status)return false;
  if(STATE.q){const hay=norm([w.title,w.platform,w.os,w.difficulty,w.summary,(w.tags||[]).join(" ")].join(" "));return norm(STATE.q).split(/\s+/).every(t=>hay.includes(t));}
  return true;
}
function card(w){
  const done=CHAIN_DONE[w.status]||0;
  const steps=CHAIN.map((_,i)=>'<div class="step '+(i<done?"done":"")+'"></div>').join("");
  const lbls=CHAIN.map((c,i)=>'<span class="'+(i===done-1?"act":"")+'">'+c+'</span>').join("");
  const tags=(w.tags||[]).slice(0,4).map(t=>'<span class="tag">#'+t+'</span>').join("");
  const dk=norm(w.difficulty);
  return '<a class="card" href="#'+encodeURIComponent(w.slug)+'" style="--edge:'+(EDGE[w.platform]||"var(--cyan)")+'">'
    +'<div class="c-top"><span class="plat '+w.platform+'">'+w.platform+'</span><span class="status '+w.status+'">'+(STATUS_LABEL[w.status]||w.status)+'</span></div>'
    +'<div class="c-name">'+esc(w.title)+'</div>'
    +'<div class="c-meta"><span class="diff" style="color:'+(DIFFCOLOR[dk]||"var(--text)")+'">'+esc(w.difficulty)+'</span><span class="sep">·</span><span>'+esc(w.os)+'</span>'+(w.ip?'<span class="sep">·</span><span>'+esc(w.ip)+'</span>':"")+'</div>'
    +'<p class="c-sum">'+esc(w.summary||"")+'</p>'
    +'<div class="chain">'+steps+'</div><div class="chain-lbl">'+lbls+'</div>'
    +'<div class="tags">'+tags+'</div></a>';
}
function renderGrid(){
  const list=WRITEUPS.filter(matches),grid=document.getElementById("grid");
  document.getElementById("count").textContent="// "+list.length+" de "+WRITEUPS.length+" máquina"+(WRITEUPS.length!==1?"s":"");
  if(!list.length){grid.innerHTML='<div class="empty"><h3>Sin resultados</h3><p>Ninguna máquina coincide con el filtro.</p></div>';return;}
  grid.innerHTML=list.map(card).join("");
  grid.querySelectorAll(".card").forEach((el,i)=>el.style.animationDelay=Math.min(i*35,300)+"ms");
}
function normalizeObsidian(md){
  md=md.replace(/!\[\[([^\]|]+?)(?:\|(\d+))?\]\]/g,(m,f,w)=>{const s=/\//.test(f)?f.trim():"img/"+f.trim();return '<img src="'+s+'" alt=""'+(w?' width="'+w+'"':"")+'>';});
  md=md.replace(/!\[([^\]]*?)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g,(m,alt,src)=>{const b=alt.indexOf("|");let wd="";if(b!==-1){const h=alt.slice(b+1).trim();if(/^\d+$/.test(h))wd=h;alt=alt.slice(0,b);}return '<img src="'+src+'" alt="'+alt.trim().replace(/"/g,"&quot;")+'"'+(wd?' width="'+wd+'"':"")+'>';});
  return md;
}
function renderWriteup(slug){
  const m=WRITEUPS.find(w=>w.slug===slug), md=getMarkdown(slug), doc=document.getElementById("doc");
  if(!m||md===null){doc.innerHTML='<div style="padding:70px 0;text-align:center;color:var(--dim);font-family:var(--mono)">No existe el writeup <code>'+esc(slug)+'</code>. <a class="back" href="#">← volver</a></div>';return;}
  document.title=m.title+" — writeup";
  const done=CHAIN_DONE[m.status]||0;
  const chain=CHAIN.map((c,i)=>'<div class="cstep '+(i<done?"done":"")+'"><div class="cs-n">0'+(i+1)+'</div><div class="cs-l">'+c+'</div></div>').join("");
  const cells=[["SO",m.os],["Dificultad",m.difficulty],["IP",m.ip||"—"],["Fecha",m.date||"—"]].map(kv=>{const st=kv[0]==="Dificultad"?' style="color:'+(DIFFCOLOR[norm(kv[1])]||"var(--text)")+'"':"";return '<div class="mcell"><div class="k">'+kv[0]+'</div><div class="v"'+st+'>'+esc(kv[1])+'</div></div>';}).join("");
  const tags=(m.tags||[]).map(t=>'<span class="wu-tag">#'+esc(t)+'</span>').join("");
  marked.setOptions({breaks:false,gfm:true});
  let body;
  try{ body=marked.parse(normalizeObsidian(md)); if(window.DOMPurify) body=DOMPurify.sanitize(body,{ADD_ATTR:["width","target"]}); }
  catch(e){ body='<p style="color:var(--hard)">Error al renderizar: '+esc(String(e&&e.message||e))+'</p>'; }
  doc.innerHTML='<header class="doc"><div class="eyebrow"><span class="wu-plat '+m.platform+'">'+m.platform+'</span><span class="wu-status '+m.status+'">'+(STATUS_LABEL[m.status]||m.status)+'</span></div>'
    +'<h1 class="title">'+esc(m.title)+'</h1><div class="metabar">'+cells+'</div><div class="wu-chain">'+chain+'</div></header>'
    +'<article>'+body+'</article><div class="wu-tags">'+tags+'</div><footer class="doc"><a href="#">← todos los writeups</a></footer>';
  doc.querySelectorAll("pre code").forEach(b=>{const cls=[...b.classList].find(c=>c.startsWith("language-"));const lang=cls?cls.replace("language-",""):"sh";b.closest("pre").setAttribute("data-lang",lang);try{hljs.highlightElement(b);}catch(e){}});
  doc.querySelectorAll("article img").forEach(img=>img.addEventListener("click",()=>openLightbox(img.currentSrc||img.src)));
  doc.querySelectorAll("article img").forEach(img=>img.addEventListener("error",function(){const name=decodeURIComponent((img.getAttribute("src")||"").split("/").pop());const ph=document.createElement("div");ph.className="img-missing";ph.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 15l5-5 4 4 3-3 6 6"/><circle cx="8.5" cy="8.5" r="1.5"/></svg><div><strong>Imagen no encontrada</strong><code>'+name+'</code></div>';img.replaceWith(ph);}));
}
function router(){
  const slug=decodeURIComponent((location.hash||"").replace(/^#/,"")).trim();
  if(slug&&getMarkdown(slug)!==null){listView.hidden=true;wuView.hidden=false;renderWriteup(slug);window.scrollTo(0,0);}
  else{wuView.hidden=true;listView.hidden=false;document.title="rootlog — writeups";window.scrollTo(0,0);}
}
function openLightbox(src){ if(!src)return; document.getElementById("lightbox-img").src=src; document.getElementById("lightbox").hidden=false; }
function closeLightbox(){ document.getElementById("lightbox").hidden=true; document.getElementById("lightbox-img").src=""; }
buildStats(); buildFilters(); renderGrid();
document.getElementById("q").addEventListener("input",e=>{STATE.q=e.target.value;renderGrid();});
document.getElementById("lightbox").addEventListener("click",closeLightbox);
document.getElementById("lightbox-close").addEventListener("click",closeLightbox);
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"&&!document.getElementById("lightbox").hidden){closeLightbox();return;}
  if(e.key==="/"&&document.activeElement.tagName!=="INPUT"){e.preventDefault();document.getElementById("q").focus();}
  if(e.key==="Escape"){const q=document.getElementById("q");q.value="";STATE.q="";renderGrid();q.blur();}
});
document.getElementById("fyear").textContent="© "+new Date().getFullYear();
window.addEventListener("hashchange",router);
router();
</script>
</body>
</html>
